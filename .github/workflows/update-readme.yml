# ============================================
# 🔄 WORKFLOW DE ATUALIZAÇÃO DO README.md
# ============================================
# Este workflow atualiza automaticamente o README.md com:
# - Status do servidor (online/offline)
# - Commits dos últimos 30 dias
# - Stars e forks do repositório
# - Métricas de atividade
# ============================================

name: Update README

on:
  # Rodar diariamente às 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  
  # Rodar também após cada push para atualizações imediatas
  push:
    branches: [ main ]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Permite que o robô salve alterações no README

    steps:
      # 1. Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v3
        
      # 2. Configurar Node.js (versão 18)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      # 3. Instalar dependências do projeto
      - name: Install dependencies
        run: npm install
        
      # 4. Executar script de atualização do README
      - name: Update README.md
        run: |
          node scripts/update-readme.js
          
      # 5. Commitar e pushar as alterações
      - name: Commit and push changes
        run: |
          git config user.name "FrancosCorp Bot"
          git config user.email "bot@francoscorporation.com"
          git add README.md
          git commit -m "🔄 Update README with latest stats and server status" || echo "No changes to commit"
          git push
        
      # 6. Deploy para GitHub Pages (se configurado)
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm run deploy
